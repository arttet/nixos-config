name: Clear Cache Weekly

on:
  schedule:
    - cron: '0 0 * * 0' # Midnight every Sunday
  workflow_dispatch:

jobs:
  clear:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Clear all caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache delete --all --repo ${{ github.repository }}
