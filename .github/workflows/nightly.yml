name: Nightly

on:
  schedule:
    - cron: "0 3 * * *" # Daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read # Default read-only for all jobs

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      deploy: ${{ steps.preflight.outputs.deploy }}
      dotfiles_repo: ${{ steps.preflight.outputs.dotfiles_repo }}
      dotfiles_ref: ${{ steps.preflight.outputs.dotfiles_ref }}
      dotfiles_module: ${{ steps.preflight.outputs.dotfiles_module }}
      dotfiles_root: ${{ steps.preflight.outputs.dotfiles_root }}
      dotfiles_links: ${{ steps.preflight.outputs.dotfiles_links }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            download-attempts = 5
            connect-timeout = 60
            stalled-download-timeout = 300
            accept-flake-config = true
            cores = 0

      - name: Validate nightly inputs
        id: preflight
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          NIGHTLY_DOTFILES_REPO: ${{ vars.NIGHTLY_DOTFILES_REPO }}
          NIGHTLY_DOTFILES_REF: ${{ vars.NIGHTLY_DOTFILES_REF || 'main' }}
          NIGHTLY_DOTFILES_MODULE: ${{ vars.NIGHTLY_DOTFILES_MODULE }}
          NIGHTLY_DOTFILES_ROOT: ${{ vars.NIGHTLY_DOTFILES_ROOT }}
          NIGHTLY_DOTFILES_LINKS: ${{ vars.NIGHTLY_DOTFILES_LINKS }}
        run: nix shell --inputs-from . nixpkgs#nushell -c nu scripts/ci/nightly-preflight.nu

  # ==============================================================================
  # Desktop
  # ==============================================================================

  desktop:
    name: Desktop Nightly
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: preflight

    env:
      MISE_VERSION: v2026.7.5
      MISE_SHA256: e04f7a6820a095ca0451a8745a335fc84d8b0656dcec535361a5de788f6b3065 # mise-v2026.7.5-linux-x64-musl.tar.gz
      MISE_DATA_DIR: ${{ github.workspace }}/.tools/mise
      MISE_INSTALL_PATH: ${{ github.workspace }}/.tools/mise/bin/mise
      DPRINT_CACHE_DIR: ${{ github.workspace }}/.tools/dprint

    outputs:
      lock_changed: ${{ steps.lock.outputs.changed }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Restore tools cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ${{ env.MISE_DATA_DIR }}
            ${{ env.DPRINT_CACHE_DIR }}
          key: ci-tools-${{ env.MISE_VERSION }}-${{ runner.os }}-${{ hashFiles('mise.toml', 'dprint.json') }}

      - name: Install mise
        uses: ./.github/actions/setup-mise
        with:
          version: ${{ env.MISE_VERSION }}
          sha256: ${{ env.MISE_SHA256 }}

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@7901478139cff6e9d44df5972fd8ab8fcade4db1 # v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            download-attempts = 5
            connect-timeout = 60
            stalled-download-timeout = 300
            accept-flake-config = true
            cores = 0

      - name: Update flake lock
        run: nix flake update

      - name: Checkout dotfiles
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ needs.preflight.outputs.dotfiles_repo }}
          ref: ${{ needs.preflight.outputs.dotfiles_ref }}
          path: target/ci/dotfiles
          persist-credentials: false

      - name: Prepare platform state
        id: prepare
        env:
          NIGHTLY_DOTFILES_MODULE: ${{ needs.preflight.outputs.dotfiles_module }}
          NIGHTLY_DOTFILES_ROOT: ${{ needs.preflight.outputs.dotfiles_root }}
          NIGHTLY_DOTFILES_LINKS: ${{ needs.preflight.outputs.dotfiles_links }}
        run: nix shell --inputs-from . nixpkgs#nushell nixpkgs#mkpasswd nixpkgs#jsonschema-cli -c nu scripts/ci/nightly-prepare.nu

      - name: Validate nightly platform state
        env:
          STATE_FILE: ${{ steps.prepare.outputs.state }}
        run: |
          # shellcheck disable=SC2016
          nix shell --inputs-from . nixpkgs#jsonschema-cli -c sh -c '
            if command -v jsonschema >/dev/null 2>&1; then
              jsonschema validate schemas/platform-state.v1.schema.json -i "$STATE_FILE"
            else
              jsonschema-cli validate schemas/platform-state.v1.schema.json -i "$STATE_FILE"
            fi
          '

      - name: Validate desktop
        env:
          NIX_CONFIG_LOCAL_STATE: ${{ steps.prepare.outputs.state }}
        run: just desktop test

      - name: Capture lockfile diff
        id: lock
        if: ${{ always() }}
        run: |
          mkdir -p target/ci/update
          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Flake lock"
              echo "No flake.lock changes."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            cp flake.lock target/ci/update/flake.lock
            git diff -- flake.lock > target/ci/update/flake-lock.diff
            {
              echo "## Flake lock"
              echo "flake.lock changed after nix flake update."
              echo ""
              echo '```diff'
              sed -n '1,240p' target/ci/update/flake-lock.diff
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload lockfile update
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ steps.lock.outputs.changed == 'true' }}
        with:
          name: nightly-flake-update
          path: target/ci/update/

  # ==============================================================================
  # Homelab Raspberry Pi 5
  # ==============================================================================

  homelab:
    name: Homelab PI 5
    runs-on: ubuntu-26.04-arm
    timeout-minutes: 360

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@7901478139cff6e9d44df5972fd8ab8fcade4db1 # v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            download-attempts = 5
            connect-timeout = 60
            stalled-download-timeout = 300
            accept-flake-config = true
            cores = 0

      - name: Set up Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: homelab-rpi5
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          signingKey: ${{ secrets.CACHIX_SIGNING_KEY }}

      - name: Build Homelab Pi 5
        run: nix build --no-link .#nixosConfigurations.homelab-rpi5.config.system.build.toplevel
