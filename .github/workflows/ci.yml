name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 2 * * *" # Daily after cache cleanup
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

      - name: Trivy filesystem scan
        # Pinned from aquasecurity/trivy-action@v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scanners: secret,misconfig
          exit-code: "1"
          severity: HIGH,CRITICAL
          cache: "true"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Semgrep
        run: pip install --quiet semgrep

      - name: Semgrep
        run: semgrep scan --config p/default --error

  static:
    name: Static
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            fallback = true
            http-connections = 1

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check formatting
        run: nix build .#checks.x86_64-linux.formatting

      - name: Check source formatting
        run: nix develop --command dprint check

      - name: Check flake
        run: nix flake check

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('docs/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install docs dependencies
        run: bun --bun install --cwd docs --frozen-lockfile

      - name: Build docs
        run: bun --bun run --cwd docs docs:build

      - name: Upload Cloudflare Pages artifact
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() && hashFiles('docs/.vitepress/dist/**') != '' }}
        with:
          name: cloudflare-docs-pages
          path: docs/.vitepress/dist/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages
          path: docs/.vitepress/dist

  installer:
    name: Installer
    runs-on: ubuntu-latest
    needs: [security, static, docs]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            fallback = true
            http-connections = 1

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Validate scripts
        run: nix shell nixpkgs#nushell nixpkgs#openssl nixpkgs#check-jsonschema -c nu scripts/tests/run.nu

  disko:
    name: Disko
    runs-on: ubuntu-latest
    needs: [security, static, docs]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            fallback = true
            http-connections = 1

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install loopback disk test dependencies
        run: sudo apt-get update && sudo apt-get install --yes cryptsetup-bin

      - name: Validate real disko on loopback disk
        run: |
          # shellcheck disable=SC2016
          nix shell nixpkgs#nushell nixpkgs#openssl nixpkgs#check-jsonschema -c sh -c '
            sudo env "PATH=$PATH" unshare --mount --propagation private sh -c '"'"'
              umount -R /mnt 2>/dev/null || true
              RUN_DISKO_LOOP_TEST=1 nu scripts/tests/run.nu
            '"'"'
          '

  vm:
    name: VM
    runs-on: ubuntu-latest
    needs: [security, static, docs]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            fallback = true
            http-connections = 1

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Just
        uses: extractions/setup-just@v4

      - name: Build VM
        run: nix build .#nixosConfigurations.vm.config.system.build.vm

      - name: Validate VM configuration
        run: just vm validate

  workstation:
    name: Headless Workstation
    runs-on: ubuntu-latest
    needs: [security, static, docs]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            fallback = true
            http-connections = 1

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Just
        uses: extractions/setup-just@v4

      - name: Validate headless workstation
        run: just workstation test

  desktop:
    name: Desktop
    runs-on: ubuntu-latest
    needs: [security, static, docs]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free Disk Space for Desktop
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          rm_cmd: "rmz"

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            fallback = true
            http-connections = 1

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Just
        uses: extractions/setup-just@v4

      - name: Validate desktop
        run: just desktop test

  deploy-gh-pages:
    name: Deploy GitHub Pages
    if: |
      !cancelled() &&
      needs.installer.result == 'success' &&
      needs.disko.result == 'success' &&
      needs.security.result == 'success' &&
      needs.static.result == 'success' &&
      needs.docs.result == 'success' &&
      needs.vm.result == 'success' &&
      needs.workstation.result == 'success' &&
      needs['desktop'].result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: [installer, disko, security, static, docs, vm, workstation, desktop]

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.github_pages.outputs.page_url }}

    steps:
      - name: Release on GitHub Pages
        id: github_pages
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages

  deploy-cf-pages:
    name: Deploy Cloudflare Pages
    if: |
      !cancelled() &&
      needs.installer.result == 'success' &&
      needs.disko.result == 'success' &&
      needs.security.result == 'success' &&
      needs.static.result == 'success' &&
      needs.docs.result == 'success' &&
      needs.vm.result == 'success' &&
      needs.workstation.result == 'success' &&
      needs['desktop'].result == 'success' &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: [installer, disko, security, static, docs, vm, workstation, desktop]

    permissions:
      contents: read
      pull-requests: write

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_DOCS_PAGES_PROJECT: ${{ vars.CF_DOCS_PAGES_PROJECT }}
      CF_DOCS_BRANCH: pr-${{ github.event.pull_request.number }}
      HAS_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
      HAS_CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
      HAS_CF_DOCS_PROJECT: ${{ vars.CF_DOCS_PAGES_PROJECT != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Download docs artifact
        uses: actions/download-artifact@v8
        with:
          name: cloudflare-docs-pages
          path: docs/.vitepress/dist

      - name: Deploy docs preview to Cloudflare Pages
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && env.HAS_CF_TOKEN == 'true' && env.HAS_CF_ACCOUNT == 'true' && env.HAS_CF_DOCS_PROJECT == 'true' }}
        id: cf_docs_preview
        run: |
          bunx wrangler pages deploy ./docs/.vitepress/dist --project-name "$CF_DOCS_PAGES_PROJECT" --branch "$CF_DOCS_BRANCH"
          echo "docs_preview_url=https://${CF_DOCS_BRANCH}.${CF_DOCS_PAGES_PROJECT}.pages.dev" >> "$GITHUB_OUTPUT"

      - name: Deploy docs production to Cloudflare Pages
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_CF_TOKEN == 'true' && env.HAS_CF_ACCOUNT == 'true' && env.HAS_CF_DOCS_PROJECT == 'true' }}
        run: bunx wrangler pages deploy ./docs/.vitepress/dist --project-name "$CF_DOCS_PAGES_PROJECT"

      - name: Update sticky PR comment
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && steps.cf_docs_preview.outputs.docs_preview_url != '' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0
        with:
          header: docs-preview
          message: |
            ## Documentation Preview

            Deployed: ${{ steps.cf_docs_preview.outputs.docs_preview_url }}
