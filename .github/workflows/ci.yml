name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check formatting
        run: nix fmt -- --ci

      - name: Check flake
        run: nix flake check

      - name: Build guest VM
        run: nix build .#nixosConfigurations.guest.config.system.build.vm

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('docs/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install docs dependencies
        run: bun --bun install --cwd docs --frozen-lockfile

      - name: Build docs
        run: bun --bun run --cwd docs docs:build

      - name: Upload Cloudflare Pages artifact
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() && hashFiles('docs/.vitepress/dist/**') != '' }}
        with:
          name: cloudflare-docs-pages
          path: docs/.vitepress/dist/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages
          path: docs/.vitepress/dist

  deploy-gh-pages:
    name: Deploy GitHub Pages
    if: |
      !cancelled() &&
      needs.validate.result == 'success' &&
      needs.docs.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: [validate, docs]

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.github_pages.outputs.page_url }}

    steps:
      - name: Release on GitHub Pages
        id: github_pages
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages

  deploy-cf-pages:
    name: Deploy Cloudflare Pages
    if: |
      !cancelled() &&
      needs.validate.result == 'success' &&
      needs.docs.result == 'success' &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: [validate, docs]

    permissions:
      contents: read
      pull-requests: write

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_DOCS_PAGES_PROJECT: ${{ vars.CF_DOCS_PAGES_PROJECT }}
      CF_DOCS_BRANCH: pr-${{ github.event.pull_request.number }}
      HAS_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
      HAS_CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
      HAS_CF_DOCS_PROJECT: ${{ vars.CF_DOCS_PAGES_PROJECT != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Download docs artifact
        uses: actions/download-artifact@v8
        with:
          name: cloudflare-docs-pages
          path: docs/.vitepress/dist

      - name: Deploy docs preview to Cloudflare Pages
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && env.HAS_CF_TOKEN == 'true' && env.HAS_CF_ACCOUNT == 'true' && env.HAS_CF_DOCS_PROJECT == 'true' }}
        id: cf_docs_preview
        run: |
          bunx wrangler pages deploy ./docs/.vitepress/dist --project-name "$CF_DOCS_PAGES_PROJECT" --branch "$CF_DOCS_BRANCH"
          echo "docs_preview_url=https://${CF_DOCS_BRANCH}.${CF_DOCS_PAGES_PROJECT}.pages.dev" >> "$GITHUB_OUTPUT"

      - name: Deploy docs production to Cloudflare Pages
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_CF_TOKEN == 'true' && env.HAS_CF_ACCOUNT == 'true' && env.HAS_CF_DOCS_PROJECT == 'true' }}
        run: bunx wrangler pages deploy ./docs/.vitepress/dist --project-name "$CF_DOCS_PAGES_PROJECT"

      - name: Update sticky PR comment
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && steps.cf_docs_preview.outputs.docs_preview_url != '' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0
        with:
          header: docs-preview
          message: |
            ## Documentation Preview

            Deployed: ${{ steps.cf_docs_preview.outputs.docs_preview_url }}
