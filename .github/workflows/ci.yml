name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *" # Daily at 02:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref == 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read # Default read-only for all jobs

env:
  MISE_VERSION: v2026.7.5
  MISE_SHA256: e04f7a6820a095ca0451a8745a335fc84d8b0656dcec535361a5de788f6b3065 # mise-v2026.7.5-linux-x64-musl.tar.gz
  MISE_DATA_DIR: ${{ github.workspace }}/.tools/mise
  MISE_INSTALL_PATH: ${{ github.workspace }}/.tools/mise/bin/mise
  DPRINT_CACHE_DIR: ${{ github.workspace }}/.tools/dprint

jobs:
  # ==============================================================================
  # Stage 1: Format Quality Gate
  # ==============================================================================
  fmt:
    name: Format
    runs-on: ubuntu-26.04
    timeout-minutes: 5

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Restore tools cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ${{ env.MISE_DATA_DIR }}
            ${{ env.DPRINT_CACHE_DIR }}
          key: ci-tools-${{ env.MISE_VERSION }}-${{ runner.os }}-${{ hashFiles('mise.toml', 'dprint.json') }}

      - name: Install mise
        uses: ./.github/actions/setup-mise
        with:
          version: ${{ env.MISE_VERSION }}
          sha256: ${{ env.MISE_SHA256 }}

      - name: Format Checks
        run: mise run fmt:all

  # ==============================================================================
  # Stage 1: Lint Quality Gate
  # ==============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-26.04
    timeout-minutes: 5

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Restore tools cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ${{ env.MISE_DATA_DIR }}
            ${{ env.DPRINT_CACHE_DIR }}
          key: ci-tools-${{ env.MISE_VERSION }}-${{ runner.os }}-${{ hashFiles('mise.toml', 'dprint.json') }}

      - name: Install mise
        uses: ./.github/actions/setup-mise
        with:
          version: ${{ env.MISE_VERSION }}
          sha256: ${{ env.MISE_SHA256 }}

      - name: Lint Checks
        run: mise run lint:all

  # ==============================================================================
  # Stage 1: Nix Quality Gate
  # ==============================================================================
  check:
    name: Nix Check
    runs-on: ubuntu-26.04
    timeout-minutes: 5

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            download-attempts = 5
            connect-timeout = 60
            stalled-download-timeout = 300
            cores = 0

      - name: Check flake
        run: nix flake check

  # ==============================================================================
  # Stage 1: Security Quality Gate
  # ==============================================================================
  security:
    name: Security
    runs-on: ubuntu-26.04
    timeout-minutes: 10

    permissions:
      contents: read # Default read-only for this job
      security-events: write # Required to upload security scan results to GitHub Security tab.

    env:
      CLAMAV_DB_DIR: ${{ github.workspace }}/.tools/clamav-db
      TRIVY_CACHE_DIR: ${{ github.workspace }}/.tools/trivy-db

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Restore tools cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ${{ env.MISE_DATA_DIR }}
            ${{ env.DPRINT_CACHE_DIR }}
          key: ci-tools-${{ env.MISE_VERSION }}-${{ runner.os }}-${{ hashFiles('mise.toml', 'dprint.json') }}

      - name: Resolve date
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Restore database cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ${{ env.CLAMAV_DB_DIR }}
            ${{ env.TRIVY_CACHE_DIR }}
          key: security-db-${{ env.DATE }}
          restore-keys: security-db-

      - name: Install mise
        uses: ./.github/actions/setup-mise
        with:
          version: ${{ env.MISE_VERSION }}
          sha256: ${{ env.MISE_SHA256 }}

      - name: Secret scanning
        run: mise run security:secrets

      - name: Trivy scan
        run: mise run security:trivy

      - name: Trivy SARIF
        run: mise run security:trivy:sarif

      - name: Upload Trivy SARIF
        if: ${{ !env.ACT }}
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy gate
        run: mise run security:trivy:gate

      - name: SAST scan (OSS rules)
        run: mise run security:semgrep

      - name: Update ClamAV database
        run: mise run security:clamav:update

      - name: Malware scan
        run: mise run security:clamav:scan

  # ==============================================================================
  # Stage 1: Documentation Gate
  # ==============================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-26.04
    timeout-minutes: 5

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Restore tools cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ${{ env.MISE_DATA_DIR }}
            ${{ env.DPRINT_CACHE_DIR }}
          key: ci-tools-${{ env.MISE_VERSION }}-${{ runner.os }}-${{ hashFiles('mise.toml', 'dprint.json') }}

      - name: Restore Bun cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('docs/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Restore lychee cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Install mise
        uses: ./.github/actions/setup-mise
        with:
          version: ${{ env.MISE_VERSION }}
          sha256: ${{ env.MISE_SHA256 }}

      - name: Install dependencies
        run: mise run docs:install

      - name: Audit dependencies
        run: mise run docs:audit

      - name: Build Cloudflare Pages docs
        run: mise run docs:build

      - name: Link Check
        run: mise run docs:links

      - name: Upload Cloudflare Pages artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cloudflare-docs-pages
          path: docs/.vitepress/dist/

      - name: Build GitHub Pages docs
        env:
          CI_BASE_URL: /nixos-config/
        run: mise run docs:build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          name: github-docs-pages
          path: docs/.vitepress/dist

  # ==============================================================================
  # Stage 1: Attest Build Provenance
  # ==============================================================================
  attest:
    name: Attest Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [docs]

    if: |
      github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork != true))

    permissions:
      attestations: write # Required to create artifact attestations
      contents: read # Required to download the build artifact
      id-token: write # Required by Sigstore to sign attestations via OIDC

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Download docs artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cloudflare-docs-pages
          path: docs/.vitepress/dist

      - name: Package docs output
        run: tar -czf docs-build.tar.gz -C docs/.vitepress/dist .

      - name: Attest build provenance
        if: ${{ !env.ACT }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: docs-build.tar.gz

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: docs/.vitepress/dist
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        if: ${{ !env.ACT }}
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: docs-build.tar.gz
          sbom-path: sbom.spdx.json

  # ==============================================================================
  # Stage 2: Installer Validation
  # ==============================================================================
  installer:
    name: Installer
    runs-on: ubuntu-26.04
    timeout-minutes: 5
    needs: [fmt, lint, check, docs]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            download-attempts = 5
            connect-timeout = 60
            stalled-download-timeout = 300
            allow-dirty = false

      - name: Validate scripts
        run: nix shell --inputs-from . nixpkgs#nushell nixpkgs#openssl nixpkgs#jsonschema-cli -c nu scripts/tests/run.nu

  # ==============================================================================
  # Stage 2: Disk Layout Validation
  # ==============================================================================
  disko:
    name: Disko
    runs-on: ubuntu-26.04
    timeout-minutes: 5
    needs: [fmt, lint, check, docs]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            download-attempts = 5
            connect-timeout = 60
            stalled-download-timeout = 300
            allow-dirty = false

      - name: Install loopback disk test dependencies
        run: sudo apt-get update && sudo apt-get install --yes cryptsetup-bin

      - name: Validate real disko on loopback disk
        run: |
          # shellcheck disable=SC2016
          nix shell --inputs-from . nixpkgs#nushell nixpkgs#openssl nixpkgs#jsonschema-cli -c sh -c '
            sudo env "PATH=$PATH" unshare --mount --propagation private sh -c '"'"'
              umount -R /mnt 2>/dev/null || true
              RUN_DISKO_LOOP_TEST=1 nu scripts/tests/run.nu
            '"'"'
          '

  # ==============================================================================
  # Stage 2: VM Build
  # ==============================================================================
  vm:
    name: VM
    runs-on: ubuntu-26.04
    timeout-minutes: 5
    needs: [fmt, lint, check, docs]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            download-attempts = 5
            connect-timeout = 60
            stalled-download-timeout = 300
            allow-dirty = false

      - name: Build VM
        run: nix build .#nixosConfigurations.vm.config.system.build.vm --no-link

  # ==============================================================================
  # Stage 2: Workstation Build
  # ==============================================================================
  workstation:
    name: Workstation
    runs-on: ubuntu-26.04
    timeout-minutes: 5
    needs: [fmt, lint, check, docs]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            download-attempts = 5
            connect-timeout = 60
            stalled-download-timeout = 300
            allow-dirty = false

      - name: Build workstation
        run: nix build .#nixosConfigurations.workstation.config.system.build.toplevel --no-link

  # ==============================================================================
  # Stage 2: Desktop Build
  # ==============================================================================
  desktop:
    name: Desktop
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    # needs: [fmt, lint, check, docs]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            download-attempts = 5
            connect-timeout = 60
            stalled-download-timeout = 300

      - name: Restore Nix cache
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-desktop-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          gc-max-store-size-linux: 3G

      - name: Build desktop
        run: nix build .#nixosConfigurations.desktop.config.system.build.toplevel --no-link

  # ==============================================================================
  # Stage 3: Cloudflare Preflight
  # ==============================================================================
  cf-preflight:
    name: Cloudflare Preflight
    runs-on: ubuntu-26.04
    timeout-minutes: 5

    needs:
      # Stage 1
      - fmt
      - lint
      - check
      - security
      - docs
      - attest
      # Stage 2
      - installer
      - disko
      - vm
      - workstation
      - desktop

    if: |
      github.event_name != 'schedule' &&
      github.actor != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.fork != true

    outputs:
      enabled: ${{ steps.check.outputs.enabled }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block

      - name: Check Cloudflare configuration
        id: check
        env:
          ENABLED: >-
            ${{ secrets.CLOUDFLARE_API_TOKEN != '' &&
            secrets.CLOUDFLARE_ACCOUNT_ID != '' &&
            vars.CF_DOCS_PAGES_PROJECT != '' &&
            vars.CF_DOCS_PAGES_DOMAIN != '' }}
        run: echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"

  # ==============================================================================
  # Stage 3: Deploy Cloudflare Pages
  # ==============================================================================
  deploy-cf-pages:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-26.04
    timeout-minutes: 5
    needs: [cf-preflight]
    if: needs.cf-preflight.outputs.enabled == 'true'

    concurrency:
      group: deploy-cf-pages-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: false

    permissions:
      contents: read # Required to download documentation artifacts.
      pull-requests: write # Required to post the docs preview link as a PR comment.

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_DOCS_PAGES_PROJECT: ${{ vars.CF_DOCS_PAGES_PROJECT }}
      CF_DOCS_BRANCH: pr-${{ github.event.pull_request.number }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Restore tools cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ${{ env.MISE_DATA_DIR }}
            ${{ env.DPRINT_CACHE_DIR }}
          key: ci-tools-${{ env.MISE_VERSION }}-${{ runner.os }}-${{ hashFiles('mise.toml', 'dprint.json') }}

      - name: Install mise
        uses: ./.github/actions/setup-mise
        with:
          version: ${{ env.MISE_VERSION }}
          sha256: ${{ env.MISE_SHA256 }}

      - name: Download docs artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: cloudflare-docs-pages
          path: docs/.vitepress/dist

      - name: Deploy docs preview to Cloudflare Pages
        if: ${{ github.event_name == 'pull_request' }}
        id: cf_docs_preview
        run: |
          bunx wrangler pages deploy ./docs/.vitepress/dist --project-name "$CF_DOCS_PAGES_PROJECT" --branch "$CF_DOCS_BRANCH"
          echo "docs_preview_url=https://${CF_DOCS_BRANCH}.${CF_DOCS_PAGES_PROJECT}.pages.dev" >> "$GITHUB_OUTPUT"

      - name: Deploy docs production to Cloudflare Pages
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: bunx wrangler pages deploy ./docs/.vitepress/dist --project-name "$CF_DOCS_PAGES_PROJECT"

      - name: Update PR comment
        if: ${{ github.event_name == 'pull_request' && !env.ACT }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DOCS_URL: https://pr-${{ github.event.pull_request.number }}.${{ vars.CF_DOCS_PAGES_DOMAIN }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --edit-last --create-if-none \
            --body "## Documentation Preview
          Deployed: $DOCS_URL"

  # ==============================================================================
  # Stage 3: Deploy GitHub Pages
  # ==============================================================================
  deploy-gh-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-26.04
    timeout-minutes: 5
    needs: [cf-preflight]

    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.actor != 'dependabot[bot]'

    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: false

    permissions:
      contents: read # Required to download GitHub Pages artifacts.
      pages: write # Required to deploy GitHub Pages artifacts.
      id-token: write # Required for OIDC authentication with GitHub Pages.

    environment:
      name: github-pages
      url: ${{ steps.github_pages.outputs.page_url }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Release on GitHub Pages
        if: ${{ !env.ACT }}
        id: github_pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        with:
          artifact_name: github-docs-pages
