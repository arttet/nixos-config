name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

      - name: Trivy filesystem scan
        # Pinned from aquasecurity/trivy-action@v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scanners: secret,misconfig
          exit-code: "1"
          severity: HIGH,CRITICAL
          cache: "true"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Semgrep
        run: pip install --quiet semgrep

      - name: Semgrep
        run: semgrep scan --config p/default --error

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check formatting
        run: nix fmt -- --ci

      - name: Check flake
        run: nix flake check

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: [validate, security]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('docs/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install docs dependencies
        run: bun --bun install --cwd docs --frozen-lockfile

      - name: Build docs
        run: bun --bun run --cwd docs docs:build

      - name: Upload Cloudflare Pages artifact
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() && hashFiles('docs/.vitepress/dist/**') != '' }}
        with:
          name: cloudflare-docs-pages
          path: docs/.vitepress/dist/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages
          path: docs/.vitepress/dist

  build-vm:
    name: Build VM
    runs-on: ubuntu-latest
    needs: [validate, security]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build VM
        run: nix build .#nixosConfigurations.vm.config.system.build.vm

  build-workstation:
    name: Build Workstation
    runs-on: ubuntu-latest
    needs: [validate, security]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build workstation
        run: nix build .#nixosConfigurations.workstation.config.system.build.toplevel

  test-vm:
    name: Test VM
    runs-on: ubuntu-latest
    needs: [build-vm]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Test VM configuration
        run: |
          nix eval .#nixosConfigurations.vm.config.services.qemuGuest.enable --apply 'enabled: if enabled then "ok" else throw "vm must enable qemuGuest"'
          nix eval .#nixosConfigurations.vm.config.boot.kernelParams --apply 'params: if builtins.elem "console=ttyS0,115200n8" params then "ok" else throw "vm must include serial console settings"'
          nix eval .#nixosConfigurations.vm.config.virtualisation.vmVariant.virtualisation.graphics --apply 'graphics: if graphics then throw "vm must be headless" else "ok"'

  test-workstation:
    name: Test Workstation
    runs-on: ubuntu-latest
    needs: [build-workstation]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Test workstation configuration
        run: |
          nix eval .#nixosConfigurations.workstation.config.services.qemuGuest.enable --apply 'enabled: if enabled then throw "workstation must not enable qemuGuest" else "ok"'
          nix eval .#nixosConfigurations.workstation.config.boot.kernelParams --apply 'params: if builtins.elem "console=ttyS0,115200n8" params then throw "workstation must not include VM serial console settings" else "ok"'
          nix eval .#nixosConfigurations.workstation.config.boot.loader.grub.enable --apply 'enabled: if enabled then "ok" else throw "workstation must enable GRUB"'
          nix eval .#nixosConfigurations.workstation.config.boot.loader.grub.device --apply 'device: if device == "nodev" then "ok" else throw "workstation GRUB must target UEFI nodev"'
          nix eval .#nixosConfigurations.workstation.config.boot.loader.grub.efiSupport --apply 'enabled: if enabled then "ok" else throw "workstation GRUB must enable EFI support"'
          nix eval .#nixosConfigurations.workstation.config.boot.loader.grub.useOSProber --apply 'enabled: if enabled then throw "workstation must disable OS prober" else "ok"'
          nix eval .#nixosConfigurations.workstation.config.boot.initrd.systemd.enable --apply 'enabled: if enabled then "ok" else throw "workstation must enable systemd initrd"'
          nix eval .#nixosConfigurations.workstation.config.boot.loader.efi.canTouchEfiVariables --apply 'enabled: if enabled then "ok" else throw "workstation must allow EFI variable updates"'
          nix eval .#nixosConfigurations.workstation.config.services.openssh.enable --apply 'enabled: if enabled then throw "workstation must not enable SSH by default" else "ok"'
          nix eval .#nixosConfigurations.workstation.config.users.users.root.hashedPassword --apply 'password: if password == "!" then "ok" else throw "workstation root password must be locked"'
          nix eval .#nixosConfigurations.workstation.config.system.stateVersion --apply 'version: if version == "25.11" then "ok" else throw "workstation stateVersion must be 25.11"'
          nix eval .#nixosConfigurations.workstation.config.hardware.enableRedistributableFirmware --apply 'enabled: if enabled then "ok" else throw "workstation must enable redistributable firmware"'
          nix eval .#nixosConfigurations.workstation.config.nix.gc.automatic --apply 'enabled: if enabled then "ok" else throw "workstation must enable automatic nix gc"'
          nix eval .#nixosConfigurations.workstation.config.nix.settings.auto-optimise-store --apply 'enabled: if enabled then "ok" else throw "workstation must enable store optimisation"'
          nix eval .#nixosConfigurations.workstation.config.platform.storage.enable --apply 'enabled: if enabled then throw "workstation storage layout must stay opt-in" else "ok"'
          nix eval .#nixosConfigurations.workstation.config.platform.storage.swapFilePath --apply 'path: if path == "/swap/swapfile" then "ok" else throw "unexpected workstation swapfile path"'
          nix eval .#nixosConfigurations.workstation.config.platform.storage.swapSizeMiB --apply 'size: if size == 8192 then "ok" else throw "unexpected workstation swapfile size"'
          nix build .#checks.x86_64-linux.workstation-storage-layout

  deploy-gh-pages:
    name: Deploy GitHub Pages
    if: |
      !cancelled() &&
      needs.validate.result == 'success' &&
      needs.security.result == 'success' &&
      needs.docs.result == 'success' &&
      needs['build-vm'].result == 'success' &&
      needs['build-workstation'].result == 'success' &&
      needs['test-vm'].result == 'success' &&
      needs['test-workstation'].result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: [validate, security, docs, build-vm, build-workstation, test-vm, test-workstation]

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.github_pages.outputs.page_url }}

    steps:
      - name: Release on GitHub Pages
        id: github_pages
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages

  deploy-cf-pages:
    name: Deploy Cloudflare Pages
    if: |
      !cancelled() &&
      needs.validate.result == 'success' &&
      needs.security.result == 'success' &&
      needs.docs.result == 'success' &&
      needs['build-vm'].result == 'success' &&
      needs['build-workstation'].result == 'success' &&
      needs['test-vm'].result == 'success' &&
      needs['test-workstation'].result == 'success' &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: [validate, security, docs, build-vm, build-workstation, test-vm, test-workstation]

    permissions:
      contents: read
      pull-requests: write

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_DOCS_PAGES_PROJECT: ${{ vars.CF_DOCS_PAGES_PROJECT }}
      CF_DOCS_BRANCH: pr-${{ github.event.pull_request.number }}
      HAS_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
      HAS_CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
      HAS_CF_DOCS_PROJECT: ${{ vars.CF_DOCS_PAGES_PROJECT != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Download docs artifact
        uses: actions/download-artifact@v8
        with:
          name: cloudflare-docs-pages
          path: docs/.vitepress/dist

      - name: Deploy docs preview to Cloudflare Pages
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && env.HAS_CF_TOKEN == 'true' && env.HAS_CF_ACCOUNT == 'true' && env.HAS_CF_DOCS_PROJECT == 'true' }}
        id: cf_docs_preview
        run: |
          bunx wrangler pages deploy ./docs/.vitepress/dist --project-name "$CF_DOCS_PAGES_PROJECT" --branch "$CF_DOCS_BRANCH"
          echo "docs_preview_url=https://${CF_DOCS_BRANCH}.${CF_DOCS_PAGES_PROJECT}.pages.dev" >> "$GITHUB_OUTPUT"

      - name: Deploy docs production to Cloudflare Pages
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_CF_TOKEN == 'true' && env.HAS_CF_ACCOUNT == 'true' && env.HAS_CF_DOCS_PROJECT == 'true' }}
        run: bunx wrangler pages deploy ./docs/.vitepress/dist --project-name "$CF_DOCS_PAGES_PROJECT"

      - name: Update sticky PR comment
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && steps.cf_docs_preview.outputs.docs_preview_url != '' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0
        with:
          header: docs-preview
          message: |
            ## Documentation Preview

            Deployed: ${{ steps.cf_docs_preview.outputs.docs_preview_url }}
