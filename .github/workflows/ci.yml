name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *" # Daily at 02:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read # Default read-only for all jobs

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Format Quality Gate
  # ---------------------------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Source Format Check
        uses: dprint/check@9cb3a2b17a8e606d37aae341e49df3654933fc23 # v2.3

      - name: Justfile Format Check
        run: just --fmt --check

  # ---------------------------------------------------------------------------
  # Stage 1: Lint Quality Gate
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: YAML Lint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3.1.1

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: false

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: ActionLint
        run: actionlint

  # ---------------------------------------------------------------------------
  # Stage 1: Nix Quality Gate
  # ---------------------------------------------------------------------------
  nix-check:
    name: Nix Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            download-attempts = 5
            connect-timeout = 60
            stalled-download-timeout = 300
            allow-dirty = false

      - name: Check flake
        run: nix flake check

  # ---------------------------------------------------------------------------
  # Stage 1: Security Quality Gate
  # ---------------------------------------------------------------------------
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read # Default read-only for this job
      security-events: write # Required to upload security scan results to GitHub Security tab.

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # main
        with:
          extra_args: --results=verified,unknown

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          cache: "true"

      - name: Trivy SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: always()
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"
          severity: HIGH,CRITICAL
          cache: "true"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ---------------------------------------------------------------------------
  # Stage 1: Antivirus Scan Gate
  # ---------------------------------------------------------------------------
  antivirus:
    name: Antivirus
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install ClamAV
        run: |
          sudo apt-get update
          sudo apt-get install --yes clamav

      - name: Prepare freshclam
        run: |
          sudo systemctl stop clamav-freshclam 2>/dev/null || true
          sudo pkill -f freshclam 2>/dev/null || true
          sudo rm -f /var/log/clamav/freshclam.log

      - name: Update virus database
        run: sudo freshclam

      - name: Scan for malware
        run: |
          clamscan -r \
            --infected \
            --exclude-dir='^\.git$' \
            --exclude-dir='^target$' \
            --exclude-dir='^docs/\.vitepress/cache$' \
            --exclude-dir='^docs/\.vitepress/dist$' \
            .

  # ---------------------------------------------------------------------------
  # Stage 1: Documentation Gate
  # ---------------------------------------------------------------------------
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Restore Bun cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('docs/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Audit docs dependencies
        working-directory: docs
        run: bun audit

      - name: Build docs (Cloudflare Pages)
        working-directory: docs
        env:
          CI_BASE_URL: /
        run: bun run docs:build

      - name: Install Lychee
        uses: jaxxstorm/action-install-gh-release@25e24d2d23ae098373794ef1d6faecb48ee52da8 # v3.0.0
        with:
          repo: lycheeverse/lychee
          tag: lychee-v0.24.2
          digest: 1f4e0ef7f6554a6ed33dd7ac144fb2e1bbed98598e7af973042fc5cd43951c9a
          platform: linux
          arch: x86_64

      - name: Link Check
        run: >-
          lychee --config lychee.toml --root-dir "$GITHUB_WORKSPACE/docs/.vitepress/dist" docs/.vitepress/dist

      - name: Upload Cloudflare Pages artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cloudflare-docs-pages
          path: docs/.vitepress/dist/

      - name: Build docs (GitHub Pages)
        working-directory: docs
        env:
          CI_BASE_URL: /nixos-config/
        run: bun run docs:build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          name: github-pages
          path: docs/.vitepress/dist

  # ---------------------------------------------------------------------------
  # Stage 2: Installer Validation
  # ---------------------------------------------------------------------------
  installer:
    name: Installer
    runs-on: ubuntu-latest
    timeout-minutes: 5

    needs: [fmt, lint, nix-check, security, antivirus, docs]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            download-attempts = 5
            connect-timeout = 60
            stalled-download-timeout = 300
            allow-dirty = false

      - name: Validate scripts
        run: nix shell nixpkgs#nushell nixpkgs#openssl nixpkgs#check-jsonschema -c nu scripts/tests/run.nu

  # ---------------------------------------------------------------------------
  # Stage 2: Disk Layout Validation
  # ---------------------------------------------------------------------------
  disko:
    name: Disko
    runs-on: ubuntu-latest
    timeout-minutes: 5

    needs: [fmt, lint, nix-check, security, antivirus, docs]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            download-attempts = 5
            connect-timeout = 60
            stalled-download-timeout = 300
            allow-dirty = false

      - name: Install loopback disk test dependencies
        run: sudo apt-get update && sudo apt-get install --yes cryptsetup-bin

      - name: Validate real disko on loopback disk
        run: |
          # shellcheck disable=SC2016
          nix shell nixpkgs#nushell nixpkgs#openssl nixpkgs#check-jsonschema -c sh -c '
            sudo env "PATH=$PATH" unshare --mount --propagation private sh -c '"'"'
              umount -R /mnt 2>/dev/null || true
              RUN_DISKO_LOOP_TEST=1 nu scripts/tests/run.nu
            '"'"'
          '

  # ---------------------------------------------------------------------------
  # Stage 2: VM Build
  # ---------------------------------------------------------------------------
  vm:
    name: VM
    runs-on: ubuntu-latest
    timeout-minutes: 10

    needs: [fmt, lint, nix-check, security, antivirus, docs]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            download-attempts = 5
            connect-timeout = 60
            stalled-download-timeout = 300
            allow-dirty = false

      - name: Build VM
        run: nix build .#nixosConfigurations.vm.config.system.build.vm --no-link

  # ---------------------------------------------------------------------------
  # Stage 2: Workstation Build
  # ---------------------------------------------------------------------------
  workstation:
    name: Workstation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    needs: [fmt, lint, nix-check, security, antivirus, docs]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            download-attempts = 5
            connect-timeout = 60
            stalled-download-timeout = 300
            allow-dirty = false

      - name: Build workstation
        run: nix build .#nixosConfigurations.workstation.config.system.build.toplevel --no-link

  # ---------------------------------------------------------------------------
  # Stage 2: Desktop Build
  # ---------------------------------------------------------------------------
  desktop:
    name: Desktop
    runs-on: ubuntu-latest
    timeout-minutes: 30

    needs: [fmt, lint, nix-check, security, antivirus, docs]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Free Disk Space for Desktop
        uses: endersonmenezes/free-disk-space@7901478139cff6e9d44df5972fd8ab8fcade4db1 # v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          rm_cmd: "rmz"

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            download-attempts = 5
            connect-timeout = 60
            stalled-download-timeout = 300
            allow-dirty = false

      - name: Restore Nix сache
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-desktop-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-desktop-${{ runner.os }}-
          gc-max-store-size-linux: 3G

      - name: Build desktop
        run: nix build .#nixosConfigurations.desktop.config.system.build.toplevel --no-link

  # ---------------------------------------------------------------------------
  # Stage 3: Deploy GitHub Pages
  # ---------------------------------------------------------------------------
  deploy-gh-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5

    needs:
      - fmt
      - lint
      - nix-check
      - security
      - antivirus
      - docs
      - installer
      - disko
      - vm
      - workstation
      - desktop

    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.actor != 'dependabot[bot]'

    permissions:
      contents: read # Required to download GitHub Pages artifacts.
      pages: write # Required to deploy GitHub Pages artifacts.
      id-token: write # Required for OIDC authentication with GitHub Pages.

    environment:
      name: github-pages
      url: ${{ steps.github_pages.outputs.page_url }}

    steps:
      - name: Release on GitHub Pages
        id: github_pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        with:
          artifact_name: github-pages

  # ---------------------------------------------------------------------------
  # Stage 3: Cloudflare Preflight
  # ---------------------------------------------------------------------------
  cf-preflight:
    name: Cloudflare Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30

    needs:
      - fmt
      - lint
      - nix-check
      - security
      - antivirus
      - docs
      - installer
      - disko
      - vm
      - workstation
      - desktop

    if: |
      github.event_name != 'schedule' &&
      github.actor != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.fork != true

    outputs:
      enabled: ${{ steps.check.outputs.enabled }}

    steps:
      - name: Check Cloudflare configuration
        id: check
        env:
          ENABLED: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && vars.CF_DOCS_PAGES_PROJECT != '' }}
        run: echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Stage 3: Deploy Cloudflare Pages
  # ---------------------------------------------------------------------------
  deploy-cf-pages:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5

    if: needs.cf-preflight.outputs.enabled == 'true'
    needs: cf-preflight

    permissions:
      contents: read # Required to download documentation artifacts.
      pull-requests: write # Required to post the docs preview link as a PR comment.

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_DOCS_PAGES_PROJECT: ${{ vars.CF_DOCS_PAGES_PROJECT }}
      CF_DOCS_BRANCH: pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Download docs artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: cloudflare-docs-pages
          path: docs/.vitepress/dist

      - name: Deploy docs preview to Cloudflare Pages
        if: ${{ github.event_name == 'pull_request' }}
        id: cf_docs_preview
        run: |
          bunx wrangler pages deploy ./docs/.vitepress/dist --project-name "$CF_DOCS_PAGES_PROJECT" --branch "$CF_DOCS_BRANCH"
          echo "docs_preview_url=https://${CF_DOCS_BRANCH}.${CF_DOCS_PAGES_PROJECT}.pages.dev" >> "$GITHUB_OUTPUT"

      - name: Deploy docs production to Cloudflare Pages
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: bunx wrangler pages deploy ./docs/.vitepress/dist --project-name "$CF_DOCS_PAGES_PROJECT"

      - name: Update sticky PR comment
        if: ${{ github.event_name == 'pull_request' && steps.cf_docs_preview.outputs.docs_preview_url != '' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: docs-preview
          message: |
            ## Documentation Preview

            Deployed: ${{ steps.cf_docs_preview.outputs.docs_preview_url }}
