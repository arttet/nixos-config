<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>HOMELAB — services</title>
        <link
            rel="icon"
            type="image/svg+xml"
            href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%233b82f6'/%3E%3Cstop offset='100%25' style='stop-color:%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Cpath d='M8 12h4v8H8zm6-4h4v12h-4zm6 6h4v6h-4z' fill='white' opacity='0.9'/%3E%3C/svg%3E"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                margin: 0;
                font-family: "JetBrains Mono", monospace;
                color: var(--fg);
                background: var(--bg);
                transition:
                    background 0.3s,
                    color 0.3s;
                --bg: #070a0f;
                --bg2: #0c1118;
                --bg3: #131a24;
                --line: #1c2530;
                --line2: #2a3644;
                --fg: #e7edf4;
                --fg2: #c3cdd9;
                --mut: #8b96a3;
                --dim: #5a6572;
                --a1: #5eead4;
                --a2: #a78bfa;
                --green: #4ade80;
                --red: #f87171;
                --yellow: #fbbf24;
                --glass: rgba(14, 19, 27, 0.55);
                --shadow: 0 18px 44px -20px rgba(0, 0, 0, 0.65);
            }
            body[data-theme="light"] {
                --bg: #edf0f3;
                --bg2: #ffffff;
                --bg3: #e5e9ee;
                --line: #d7dde4;
                --line2: #c2ccd6;
                --fg: #141b23;
                --fg2: #3a4652;
                --mut: #5e6b78;
                --dim: #8b96a1;
                --a1: #0d9488;
                --a2: #7c5cbf;
                --green: #16a34a;
                --red: #dc2626;
                --yellow: #b45309;
                --glass: rgba(255, 255, 255, 0.68);
                --shadow: 0 18px 40px -22px rgba(30, 41, 59, 0.35);
            }
            body::before {
                content: "";
                position: fixed;
                inset: -20%;
                z-index: -2;
                pointer-events: none;
                background:
                    radial-gradient(
                        42% 38% at 78% 6%,
                        color-mix(in srgb, var(--a1) 13%, transparent),
                        transparent 70%
                    ),
                    radial-gradient(
                        38% 34% at 10% 92%,
                        color-mix(in srgb, var(--a2) 11%, transparent),
                        transparent 70%
                    ),
                    radial-gradient(
                        30% 30% at 38% 30%,
                        color-mix(in srgb, var(--a1) 5%, transparent),
                        transparent 70%
                    );
                animation: aurora 26s ease-in-out infinite alternate;
            }
            body::after {
                content: "";
                position: fixed;
                inset: 0;
                z-index: -1;
                pointer-events: none;
                opacity: 0.45;
                background-image:
                    linear-gradient(
                        color-mix(in srgb, var(--fg) 4%, transparent) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        90deg,
                        color-mix(in srgb, var(--fg) 4%, transparent) 1px,
                        transparent 1px
                    );
                background-size: 44px 44px;
                mask-image: radial-gradient(
                    75% 60% at 50% 18%,
                    black,
                    transparent
                );
                -webkit-mask-image: radial-gradient(
                    75% 60% at 50% 18%,
                    black,
                    transparent
                );
            }
            @keyframes aurora {
                0% {
                    transform: translate3d(-2%, -1%, 0) scale(1);
                }
                50% {
                    transform: translate3d(2%, 1.5%, 0) scale(1.06);
                }
                100% {
                    transform: translate3d(-1%, 2%, 0) scale(1.03);
                }
            }
            @keyframes blink {
                0%,
                49% {
                    opacity: 1;
                }
                50%,
                100% {
                    opacity: 0;
                }
            }
            @keyframes rise {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.3;
                }
            }
            @keyframes glowUp {
                0% {
                    box-shadow: 0 0 0 0
                        color-mix(in srgb, var(--green) 55%, transparent);
                }
                70% {
                    box-shadow: 0 0 0 8px transparent;
                }
                100% {
                    box-shadow: 0 0 0 0 transparent;
                }
            }
            @keyframes glowDown {
                0% {
                    box-shadow: 0 0 0 0
                        color-mix(in srgb, var(--red) 55%, transparent);
                }
                70% {
                    box-shadow: 0 0 0 8px transparent;
                }
                100% {
                    box-shadow: 0 0 0 0 transparent;
                }
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            @keyframes toastIn {
                from {
                    opacity: 0;
                    transform: translate(-50%, 12px);
                }
                to {
                    opacity: 1;
                    transform: translate(-50%, 0);
                }
            }
            ::selection {
                background: color-mix(in srgb, var(--a1) 28%, transparent);
            }
            ::-webkit-scrollbar {
                width: 10px;
                height: 10px;
            }
            ::-webkit-scrollbar-thumb {
                background: var(--line2);
                border-radius: 6px;
                border: 2px solid var(--bg);
            }
            input {
                font-family: inherit;
            }
            ::placeholder {
                color: var(--dim);
            }
            .wrap {
                max-width: 1120px;
                margin: 0 auto;
                padding: 46px 34px 64px;
            }
            .hd {
                display: flex;
                align-items: flex-end;
                justify-content: space-between;
                gap: 18px 28px;
                flex-wrap: wrap;
                padding-bottom: 20px;
                border-bottom: 1px solid var(--line);
                animation: rise 0.5s both;
            }
            .logo-row {
                display: flex;
                align-items: baseline;
                gap: 2px;
            }
            .logo {
                font-size: 23px;
                font-weight: 800;
                letter-spacing: 3.5px;
                background: linear-gradient(
                    90deg,
                    var(--a1),
                    var(--a2),
                    var(--green),
                    var(--a1)
                );
                background-size: 300% 100%;
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                -webkit-text-fill-color: transparent;
                animation: palette 9s linear infinite;
            }
            @keyframes palette {
                to {
                    background-position: 300% 0;
                }
            }
            .caret {
                font-size: 23px;
                font-weight: 800;
                animation: blink 1.1s infinite;
                color: var(--a1);
            }
            .domain {
                font-size: 10.5px;
                color: var(--dim);
                margin-top: 6px;
                letter-spacing: 1px;
            }
            .hd-r {
                display: flex;
                align-items: center;
                gap: 20px;
            }
            .donut-block {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .donut-bg {
                stroke: var(--line);
            }
            .donut-fg {
                stroke: var(--green);
                transition:
                    stroke-dashoffset 0.7s cubic-bezier(0.2, 0.7, 0.2, 1),
                    stroke 0.3s;
            }
            .donut-fg.warn {
                stroke: var(--yellow);
            }
            .donut-fg.bad {
                stroke: var(--red);
            }
            .donut-t {
                fill: var(--fg);
                font-size: 11.5px;
                font-weight: 800;
                font-family: "JetBrains Mono", monospace;
            }
            .sum {
                display: flex;
                flex-direction: column;
                gap: 3px;
            }
            .sum-line {
                display: flex;
                align-items: center;
                gap: 7px;
                font-size: 11.5px;
                font-weight: 700;
            }
            .sum-line.ok {
                color: var(--green);
            }
            .sum-line.warn {
                color: var(--yellow);
            }
            .sum-line.bad {
                color: var(--red);
            }
            .sum-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: currentColor;
                flex-shrink: 0;
            }
            .sum-line.ok .sum-dot {
                animation: glowUp 2.2s infinite;
            }
            .sum-line.warn .sum-dot {
                animation: pulse 1.1s infinite;
            }
            .sum-line.bad .sum-dot {
                animation: glowDown 1.5s infinite;
            }
            .sum-sub {
                font-size: 10px;
                color: var(--dim);
            }
            .sum-line.clickable {
                cursor: pointer;
                padding: 2px 7px;
                margin: -2px -7px;
                border-radius: 7px;
                transition:
                    background 0.15s,
                    box-shadow 0.15s;
            }
            .sum-line.clickable:hover {
                background: color-mix(in srgb, var(--red) 12%, transparent);
            }
            .sum-line.filtering {
                background: color-mix(in srgb, var(--red) 14%, transparent);
                box-shadow: inset 0 0 0 1px
                    color-mix(in srgb, var(--red) 45%, transparent);
            }
            .clock {
                font-size: 13px;
                font-weight: 700;
                color: var(--fg2);
                letter-spacing: 1.5px;
                padding-left: 20px;
                border-left: 1px solid var(--line);
                min-width: 74px;
                text-align: center;
            }
            .cmd {
                display: flex;
                gap: 10px;
                margin: 24px 0 32px;
                flex-wrap: wrap;
                align-items: stretch;
                animation: rise 0.5s 0.06s both;
            }
            .search {
                flex: 1;
                min-width: 250px;
                display: flex;
                align-items: center;
                gap: 11px;
                border: 1px solid var(--line);
                background: var(--glass);
                backdrop-filter: blur(14px);
                -webkit-backdrop-filter: blur(14px);
                border-radius: 10px;
                padding: 0 15px;
                transition:
                    border-color 0.2s,
                    box-shadow 0.2s;
            }
            .search:focus-within {
                border-color: color-mix(in srgb, var(--a1) 55%, var(--line));
                box-shadow:
                    0 0 0 3px color-mix(in srgb, var(--a1) 13%, transparent),
                    0 0 26px color-mix(in srgb, var(--a1) 10%, transparent);
            }
            .s-ic {
                color: var(--a1);
                font-weight: 800;
                font-size: 14px;
            }
            .search input {
                flex: 1;
                background: none;
                border: none;
                outline: none;
                color: var(--fg);
                font-size: 12.5px;
                height: 42px;
                min-width: 0;
            }
            .kbd {
                font-size: 9px;
                color: var(--dim);
                border: 1px solid var(--line);
                border-bottom-width: 2px;
                border-radius: 5px;
                padding: 2px 6px;
                background: var(--bg2);
                white-space: nowrap;
            }
            .btns {
                display: flex;
                gap: 8px;
            }
            .ibtn {
                width: 44px;
                border: 1px solid var(--line);
                background: var(--glass);
                backdrop-filter: blur(14px);
                -webkit-backdrop-filter: blur(14px);
                color: var(--mut);
                border-radius: 10px;
                font-family: inherit;
                font-size: 15px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    transform 0.18s,
                    border-color 0.18s,
                    color 0.18s,
                    box-shadow 0.18s,
                    background 0.18s;
            }
            .ibtn:hover {
                border-color: var(--a1);
                color: var(--a1);
                transform: translateY(-1px);
                box-shadow: 0 8px 18px -8px
                    color-mix(in srgb, var(--a1) 50%, transparent);
            }
            .ibtn.spin {
                animation: spin 1.1s linear infinite;
                color: var(--a1);
                border-color: color-mix(in srgb, var(--a1) 40%, var(--line));
            }
            .ibtn:focus-visible {
                outline: 2px solid var(--a1);
                outline-offset: 2px;
            }
            .group {
                margin-bottom: 34px;
                animation: rise 0.5s both;
            }
            .ghead {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 7px 8px;
                margin: 0 -8px 14px;
                cursor: pointer;
                user-select: none;
                border-radius: 8px;
                transition: background 0.15s;
            }
            .ghead:hover {
                background: color-mix(in srgb, var(--fg) 4%, transparent);
            }
            .g-idx {
                font-size: 10px;
                color: var(--dim);
                font-weight: 700;
            }
            .g-chev {
                font-size: 8.5px;
                color: var(--dim);
                transition: transform 0.25s;
                display: inline-block;
            }
            .g-name {
                font-size: 10.5px;
                letter-spacing: 3px;
                color: var(--a1);
                font-weight: 800;
            }
            .g-count {
                font-size: 10px;
                color: var(--dim);
            }
            .g-bar {
                flex: 1;
                height: 2px;
                background: var(--line);
                border-radius: 2px;
                overflow: hidden;
                min-width: 40px;
            }
            .g-bar i {
                display: block;
                height: 100%;
                background: linear-gradient(90deg, var(--a1), var(--green));
                border-radius: 2px;
                transition: width 0.6s cubic-bezier(0.2, 0.7, 0.2, 1);
            }
            .g-hl {
                font-size: 9.5px;
                color: var(--dim);
                min-width: 32px;
                text-align: right;
            }
            .cards {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
                gap: 14px;
            }
            .card {
                position: relative;
                overflow: hidden;
                border: 1px solid var(--line);
                border-radius: 14px;
                padding: 16px;
                display: flex;
                flex-direction: column;
                gap: 13px;
                background:
                    linear-gradient(
                        180deg,
                        color-mix(in srgb, var(--fg) 3%, transparent),
                        transparent 45%
                    ),
                    var(--glass);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                cursor: pointer;
                transition:
                    transform 0.2s,
                    border-color 0.2s,
                    box-shadow 0.2s,
                    opacity 0.3s,
                    filter 0.3s;
                animation: rise 0.5s both;
            }
            .card:hover {
                transform: translateY(-3px);
                border-color: color-mix(in srgb, var(--a1) 45%, var(--line));
                box-shadow:
                    var(--shadow),
                    0 0 0 1px color-mix(in srgb, var(--a1) 22%, transparent);
            }
            .card-top {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .card-meta {
                display: flex;
                align-items: center;
                gap: 9px;
            }
            .sdot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: currentColor;
                flex-shrink: 0;
            }
            .st-up .sdot {
                color: var(--green);
                animation: glowUp 2.2s infinite;
            }
            .st-down .sdot {
                color: var(--red);
                animation: glowDown 1.5s infinite;
            }
            .st-checking .sdot {
                color: var(--yellow);
                animation: pulse 1.1s infinite;
            }
            .st-unknown .sdot {
                color: var(--dim);
            }
            .tile {
                width: 40px;
                height: 40px;
                border-radius: 11px;
                background: linear-gradient(
                    145deg,
                    color-mix(in srgb, var(--a1) 14%, var(--bg3)),
                    var(--bg3)
                );
                border: 1px solid var(--line);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 19px;
                color: var(--a1);
                overflow: hidden;
                flex-shrink: 0;
            }
            .tile img {
                width: 22px;
                height: 22px;
                object-fit: contain;
            }
            .card-id {
                min-width: 0;
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .card-name {
                font-weight: 800;
                font-size: 13.5px;
                letter-spacing: 0.2px;
            }
            .card-host {
                font-size: 10.5px;
                color: var(--mut);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .card-foot {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .lat {
                font-size: 10px;
                color: var(--dim);
            }
            .pill {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                font-size: 9.5px;
                font-weight: 800;
                letter-spacing: 1px;
                padding: 4px 9px;
                border-radius: 99px;
                border: 1px solid transparent;
                white-space: nowrap;
            }
            .pdot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: currentColor;
                flex-shrink: 0;
            }
            .st-up .pill {
                color: var(--green);
                border-color: color-mix(in srgb, var(--green) 30%, transparent);
                background: color-mix(in srgb, var(--green) 8%, transparent);
            }
            .st-up .pdot {
                animation: glowUp 2.2s infinite;
            }
            .st-down .pill {
                color: var(--red);
                border-color: color-mix(in srgb, var(--red) 35%, transparent);
                background: color-mix(in srgb, var(--red) 8%, transparent);
            }
            .st-down .pdot {
                animation: glowDown 1.5s infinite;
            }
            .st-checking .pill {
                color: var(--yellow);
                border-color: color-mix(in srgb, var(--yellow) 30%, transparent);
                background: color-mix(in srgb, var(--yellow) 8%, transparent);
            }
            .st-checking .pdot {
                animation: pulse 1.1s infinite;
            }
            .st-unknown .pill {
                color: var(--dim);
                border-color: var(--line);
            }
            .st-down.card,
            .st-down.row {
                opacity: 0.6;
                filter: saturate(0.35);
            }
            .st-down.card {
                border-color: color-mix(in srgb, var(--red) 45%, var(--line));
            }
            .st-down.row {
                background: color-mix(in srgb, var(--red) 5%, transparent);
            }
            .st-down.card:hover,
            .st-down.row:hover {
                opacity: 0.9;
                filter: none;
            }
            .st-down.card:hover {
                border-color: color-mix(in srgb, var(--red) 75%, var(--line));
                box-shadow:
                    var(--shadow),
                    0 0 0 1px color-mix(in srgb, var(--red) 45%, transparent);
            }
            .iconbtn {
                background: var(--bg2);
                border: 1px solid var(--line);
                color: var(--mut);
                border-radius: 7px;
                width: 26px;
                height: 26px;
                font-family: inherit;
                font-size: 11px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    opacity 0.18s,
                    transform 0.15s,
                    border-color 0.15s,
                    color 0.15s;
                opacity: 0;
                flex-shrink: 0;
            }
            .card:hover .iconbtn,
            .row:hover .iconbtn {
                opacity: 1;
            }
            .iconbtn:hover {
                border-color: var(--a1);
                color: var(--a1);
                transform: scale(1.1);
            }
            .iconbtn:focus-visible {
                opacity: 1;
                outline: 2px solid var(--a1);
                outline-offset: 1px;
            }
            .rows {
                border: 1px solid var(--line);
                border-radius: 14px;
                background: var(--glass);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                overflow: hidden;
            }
            .row {
                position: relative;
                display: grid;
                grid-template-columns:
                    32px 28px minmax(130px, 180px) 1fr 66px 90px 28px
                    92px;
                align-items: center;
                gap: 12px;
                padding: 10px 16px;
                border-bottom: 1px solid var(--line);
                cursor: pointer;
                transition:
                    background 0.15s,
                    opacity 0.3s,
                    filter 0.3s;
                animation: rise 0.4s both;
            }
            .row:last-child {
                border-bottom: none;
            }
            .row:hover {
                background: color-mix(in srgb, var(--fg) 4%, transparent);
            }
            .r-num {
                font-size: 10px;
                color: var(--dim);
            }
            .r-ic {
                width: 26px;
                height: 26px;
                border-radius: 7px;
                background: var(--bg3);
                border: 1px solid var(--line);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 13px;
                color: var(--a1);
                overflow: hidden;
            }
            .r-ic img {
                width: 15px;
                height: 15px;
                object-fit: contain;
            }
            .r-name {
                font-weight: 700;
                font-size: 12.5px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                min-width: 0;
            }
            .r-host {
                font-size: 10.5px;
                color: var(--mut);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                min-width: 0;
            }
            .spark {
                color: var(--a1);
                opacity: 0.85;
                display: flex;
                align-items: center;
            }
            .r-lat {
                display: flex;
                flex-direction: column;
                gap: 4px;
                align-items: stretch;
            }
            .r-latbar {
                height: 3px;
                background: var(--line);
                border-radius: 2px;
                overflow: hidden;
            }
            .r-latbar i {
                display: block;
                height: 100%;
                background: color-mix(in srgb, var(--a1) 70%, var(--fg2));
                border-radius: 2px;
                transition: width 0.5s cubic-bezier(0.2, 0.7, 0.2, 1);
            }
            .r-ms {
                font-size: 9.5px;
                color: var(--dim);
                text-align: right;
            }
            .row .pill {
                justify-self: end;
            }
            .empty {
                text-align: center;
                padding: 64px 0;
                color: var(--dim);
                font-size: 12px;
                animation: fadeIn 0.3s both;
            }
            .e-ic {
                font-size: 34px;
                display: block;
                margin-bottom: 12px;
                opacity: 0.55;
            }
            .e-q {
                color: var(--fg2);
                font-weight: 700;
            }
            .e-hint {
                margin-top: 10px;
                font-size: 10.5px;
            }
            .foot {
                border-top: 1px solid var(--line);
                margin-top: 18px;
                padding-top: 14px;
                display: flex;
                gap: 9px 16px;
                flex-wrap: wrap;
                font-size: 9.5px;
                color: var(--dim);
                align-items: center;
            }
            .foot .kbd {
                margin-right: 5px;
            }
            .auto {
                margin-left: auto;
            }
            .toast {
                position: fixed;
                bottom: 28px;
                left: 50%;
                transform: translateX(-50%);
                background: var(--bg3);
                border: 1px solid color-mix(in srgb, var(--green) 55%, var(--line));
                color: var(--fg);
                border-radius: 10px;
                padding: 11px 20px;
                font-size: 11.5px;
                box-shadow: var(--shadow);
                z-index: 100;
                animation: toastIn 0.25s both;
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                display: none;
            }
            .toast.show {
                display: block;
            }
            @media (max-width: 860px) {
                .wrap {
                    padding: 34px 18px 48px;
                }
                .row {
                    grid-template-columns: 26px 26px 1fr 64px 26px 84px;
                    gap: 9px;
                    padding: 10px 12px;
                }
                .r-host,
                .spark,
                .r-latbar {
                    display: none;
                }
                .clock {
                    display: none;
                }
            }
            @media (prefers-reduced-motion: reduce) {
                *,
                *::before,
                *::after {
                    animation-duration: 0.001s !important;
                    animation-iteration-count: 1 !important;
                    transition-duration: 0.001s !important;
                }
            }
        </style>
    </head>
    <body data-theme="dark">
        <div class="wrap">
            <div class="hd">
                <div>
                    <div class="logo-row">
                        <span class="logo">HOMELAB</span><span class="caret">_</span>
                    </div>
                    <div class="domain">*.pi.lan · auto-refresh 60s</div>
                </div>
                <div class="hd-r">
                    <div class="donut-block">
                        <svg class="donut" width="40" height="40" viewBox="0 0 40 40">
                            <circle
                                class="donut-bg"
                                cx="20"
                                cy="20"
                                r="15.9155"
                                fill="none"
                                stroke-width="3.5"
                            ></circle>
                            <circle
                                id="donutFg"
                                class="donut-fg"
                                cx="20"
                                cy="20"
                                r="15.9155"
                                fill="none"
                                stroke-width="3.5"
                                stroke-dasharray="100"
                                stroke-dashoffset="100"
                                stroke-linecap="round"
                                transform="rotate(-90 20 20)"
                            ></circle>
                            <text id="donutText" class="donut-t" x="20" y="24" text-anchor="middle">
                                0
                            </text>
                        </svg>
                        <div class="sum">
                            <div class="sum-line" id="sumLine">
                                <span class="sum-dot"></span
                                ><span id="sumText">checking…</span>
                            </div>
                            <div class="sum-sub" id="sumSub"></div>
                        </div>
                    </div>
                    <span class="clock" id="clock"></span>
                </div>
            </div>

            <div class="cmd">
                <div class="search">
                    <span class="s-ic">/</span>
                    <input
                        id="searchInput"
                        placeholder="search services…  (Enter opens first match)"
                        autocomplete="off"
                        spellcheck="false"
                    />
                    <span class="kbd">CTRL K</span>
                </div>
                <div class="btns">
                    <button class="ibtn" id="btnGroups" title="Groups (g)">#</button>
                    <button class="ibtn" id="btnView" title="View (v)">▦</button>
                    <button class="ibtn" id="btnRecheck" title="Re-check (r)">↻</button>
                    <button class="ibtn" id="btnTheme" title="Theme (t)">☾</button>
                </div>
            </div>

            <div id="board"></div>

            <div class="foot">
                <span><span class="kbd">/</span>search</span>
                <span><span class="kbd">⏎</span>open first</span>
                <span><span class="kbd">1-9</span>group</span>
                <span><span class="kbd">v</span>view</span>
                <span><span class="kbd">g</span>groups</span>
                <span><span class="kbd">t</span>theme</span>
                <span><span class="kbd">r</span>refresh</span>
                <span><span class="kbd">d</span>down only</span>
                <span><span class="kbd">esc</span>clear</span>
                <span class="auto" id="serviceCountFoot"></span>
            </div>
        </div>

        <div class="toast" id="toast"></div>

        <script>
            const POLL_MS = 60000;
            const TIMEOUT_MS = 6000;
            const HIST_LEN = 12;

            function persist(key, val) {
                try {
                    localStorage.setItem(key, val);
                } catch (e) {}
            }
            function loadJSON(key, fallback) {
                try {
                    return JSON.parse(localStorage.getItem(key) || "null") ?? fallback;
                } catch (e) {
                    return fallback;
                }
            }

            const state = {
                theme: localStorage.getItem("hl_theme") || "dark",
                view: localStorage.getItem("hl_view") || "cards",
                grouped: localStorage.getItem("hl_grouped") !== "0",
                collapsed: loadJSON("hl_collapsed", {}),
                q: "",
                onlyDown: false,
                services: [],
                statuses: {},
                latencies: {},
                hist: {},
                broken: {},
                groupOrder: [],
            };

            const board = document.getElementById("board");
            const searchInput = document.getElementById("searchInput");
            const clockEl = document.getElementById("clock");
            const toastEl = document.getElementById("toast");
            const donutFg = document.getElementById("donutFg");
            const donutText = document.getElementById("donutText");
            const sumLine = document.getElementById("sumLine");
            const sumText = document.getElementById("sumText");
            const sumSub = document.getElementById("sumSub");
            const btnView = document.getElementById("btnView");
            const btnGroups = document.getElementById("btnGroups");
            const btnRecheck = document.getElementById("btnRecheck");
            const btnTheme = document.getElementById("btnTheme");
            const serviceCountFoot = document.getElementById("serviceCountFoot");

            function applyTheme() {
                document.body.dataset.theme = state.theme;
                btnTheme.textContent = state.theme === "dark" ? "☾" : "☀";
            }
            function setTheme(t) {
                state.theme = t;
                persist("hl_theme", t);
                applyTheme();
            }
            function setView(v) {
                state.view = v;
                persist("hl_view", v);
                btnView.textContent = v === "cards" ? "▦" : "≡";
                renderBoard();
            }
            function toggleGrouped() {
                state.grouped = !state.grouped;
                persist("hl_grouped", state.grouped ? "1" : "0");
                btnGroups.textContent = state.grouped ? "#" : "=";
                renderBoard();
            }
            function toggleGroup(name) {
                state.collapsed[name] = !state.collapsed[name];
                persist("hl_collapsed", JSON.stringify(state.collapsed));
                renderBoard();
            }
            function toggleDown() {
                if (!state.onlyDown) {
                    const down = state.services.filter(
                        (s) => state.statuses[s.host] === "down",
                    ).length;
                    if (down === 0) return;
                }
                state.onlyDown = !state.onlyDown;
                renderBoard();
            }

            function urlFor(svc) {
                return `https://${svc.host}`;
            }

            let toastT;
            function showToast(msg) {
                toastEl.textContent = "✓ " + msg;
                toastEl.classList.add("show");
                clearTimeout(toastT);
                toastT = setTimeout(() => toastEl.classList.remove("show"), 2200);
            }
            function copyUrl(svc, e) {
                e && e.stopPropagation();
                const url = urlFor(svc);
                const done = () => showToast("copied: " + url);
                const ta = document.createElement("textarea");
                ta.value = url;
                ta.style.cssText = "position:fixed;opacity:0";
                document.body.appendChild(ta);
                ta.select();
                try {
                    document.execCommand("copy");
                    done();
                } catch (err) {
                    navigator.clipboard?.writeText(url).then(done);
                }
                document.body.removeChild(ta);
            }

            function spot(e) {
                const el = e.currentTarget,
                    r = el.getBoundingClientRect();
                el.style.setProperty("--mx", e.clientX - r.left + "px");
                el.style.setProperty("--my", e.clientY - r.top + "px");
            }

            function sparkFor(arr) {
                if (!arr || arr.length < 2) return null;
                const max = Math.max(...arr, 1),
                    n = arr.length,
                    W = 58,
                    H = 16;
                return arr
                    .map(
                        (v, i) =>
                            ((i * W) / (n - 1)).toFixed(1) +
                            "," +
                            (H - 1 - (v / max) * (H - 4)).toFixed(1),
                    )
                    .join(" ");
            }

            function tickClock() {
                clockEl.textContent = new Date().toLocaleTimeString("en-GB", {
                    hour12: false,
                });
            }
            tickClock();
            setInterval(tickClock, 1000);

            // soft = keep previous statuses visible while re-checking (auto-poll)
            function checkAll(soft) {
                if (!soft) {
                    for (const s of state.services) state.statuses[s.host] = "checking";
                }
                btnRecheck.classList.add("spin");
                renderBoard();
                let pending = state.services.length;
                if (!pending) btnRecheck.classList.remove("spin");
                for (const svc of state.services) {
                    const t0 = performance.now();
                    // No mode:"no-cors" here on purpose: an opaque no-cors response
                    // hides the real HTTP status, so a 502 from Caddy's own
                    // "storage not unlocked" fallback page is indistinguishable
                    // from a real 200 — every service would report "up" the
                    // instant Caddy itself answers. Reading r.status requires the
                    // Access-Control-Allow-Origin header Caddy adds per-vhost
                    // (see proxyVhost in caddy.nix); a 5xx means the fallback
                    // page (or a genuinely broken backend) answered instead of
                    // the real service.
                    fetch(urlFor(svc), {
                        cache: "no-store",
                        signal: AbortSignal.timeout(TIMEOUT_MS),
                    })
                        .then((r) => {
                            const down = r.status >= 500;
                            report(
                                svc.host,
                                down ? "down" : "up",
                                down ? null : Math.round(performance.now() - t0),
                            );
                        })
                        .catch((err) =>
                            report(
                                svc.host,
                                err && err.name === "TimeoutError" ? "unknown" : "down",
                                null,
                            ),
                        )
                        .finally(() => {
                            pending--;
                            if (pending <= 0) btnRecheck.classList.remove("spin");
                        });
                }
            }

            function report(host, st, ms) {
                state.statuses[host] = st;
                if (ms != null) {
                    state.latencies[host] = ms;
                    const h = (state.hist[host] || []).slice(-(HIST_LEN - 1));
                    h.push(ms);
                    state.hist[host] = h;
                }
                renderBoard();
            }

            function computeGroups() {
                const query = state.q.trim().toLowerCase();
                const match = (s) =>
                    (!query ||
                        s.name.toLowerCase().includes(query) ||
                        s.purpose.toLowerCase().includes(query) ||
                        s.host.toLowerCase().includes(query)) &&
                    (!state.onlyDown || state.statuses[s.host] === "down");

                let maxLat = 1;
                for (const s of state.services) {
                    const l = state.latencies[s.host];
                    if (l != null) maxLat = Math.max(maxLat, l);
                }

                const byGroup = new Map();
                for (const name of state.groupOrder) byGroup.set(name, []);
                let num = 0;
                for (const svc of state.services) {
                    if (!match(svc)) continue;
                    num++;
                    const st = state.statuses[svc.host] || "checking";
                    const lat = state.latencies[svc.host];
                    const list = byGroup.get(svc.group) || [];
                    list.push({
                        svc,
                        num,
                        st,
                        lat,
                        spark: sparkFor(state.hist[svc.host]),
                        latW: lat != null ? Math.max(4, Math.round((lat / maxLat) * 100)) : 0,
                    });
                    byGroup.set(svc.group, list);
                }

                let groups = state.groupOrder
                    .map((name, gi) => ({ name, gi, items: byGroup.get(name) || [] }))
                    .filter((g) => g.items.length > 0);

                if (!state.grouped) {
                    const flat = groups.flatMap((g) => g.items);
                    groups = flat.length
                        ? [{ name: null, gi: 0, items: flat }]
                        : [];
                }
                return groups;
            }

            function iconHtml(svc) {
                if (svc.img && !state.broken[svc.host]) {
                    const url = `https://cdn.jsdelivr.net/gh/selfhst/icons/webp/${svc.img}.webp`;
                    return `<img src="${url}" alt="" onerror="window.__hlIconErr('${svc.host}')">`;
                }
                return `<span>${svc.icon || svc.name[0].toUpperCase()}</span>`;
            }
            window.__hlIconErr = (host) => {
                state.broken[host] = true;
                renderBoard();
            };

            function statusText(st) {
                return st === "up"
                    ? "UP"
                    : st === "down"
                      ? "DOWN"
                      : st === "unknown"
                        ? "?"
                        : "···";
            }

            function renderBoard() {
                const groups = computeGroups();
                let firstUrl = null;
                let html = "";

                for (const g of groups) {
                    const open = state.q.trim() ? true : !state.collapsed[g.name];
                    const gUp = g.items.filter((it) => it.st === "up").length;
                    html += `<div class="group">`;
                    if (g.name) {
                        html += `
              <div class="ghead" data-group="${g.name}">
                <span class="g-idx">${String(g.gi + 1).padStart(2, "0")}</span>
                <span class="g-chev" style="transform:${open ? "rotate(90deg)" : "rotate(0deg)"}">▶</span>
                <span class="g-name">## ${g.name.toUpperCase()}</span>
                <span class="g-count">[${g.items.length}]</span>
                <span class="g-bar"><i style="width:${g.items.length ? Math.round((gUp / g.items.length) * 100) : 0}%"></i></span>
                <span class="g-hl">${gUp}/${g.items.length}</span>
              </div>`;
                    }
                    if (open) {
                        html +=
                            state.view === "cards"
                                ? renderCards(g.items)
                                : renderRows(g.items);
                    }
                    html += `</div>`;
                    for (const it of g.items) {
                        if (!firstUrl) firstUrl = urlFor(it.svc);
                    }
                }

                if (!groups.length) {
                    const downMode = state.onlyDown && !state.q.trim();
                    html = `<div class="empty">
            <span class="e-ic">${downMode ? "✓" : "∅"}</span>
            <div>${downMode ? "no services are down — everything is up" : `nothing found for &ldquo;${escapeHtml(state.q)}&rdquo;`}</div>
            <div class="e-hint">${downMode ? "[ esc ] or click the status line to show all" : "[ esc ] clear search"}</div>
          </div>`;
                }

                board.innerHTML = html;
                wireBoardEvents();
                window.__hlFirstUrl = firstUrl;
                renderSummary();
            }

            function escapeHtml(s) {
                return String(s).replace(
                    /[&<>"']/g,
                    (c) =>
                        ({
                            "&": "&amp;",
                            "<": "&lt;",
                            ">": "&gt;",
                            '"': "&quot;",
                            "'": "&#39;",
                        })[c],
                );
            }

            function renderCards(items) {
                return `<div class="cards">${items
                    .map(
                        (it) => `
          <div class="card st-${it.st}" data-host="${it.svc.host}">
            <div class="card-top">
              <div class="tile">${iconHtml(it.svc)}</div>
              <div class="card-meta">
                <span class="sdot"></span>
                <button class="iconbtn" data-copy="${it.svc.host}" title="Copy URL">⧉</button>
              </div>
            </div>
            <div class="card-id">
              <div class="card-name">${escapeHtml(it.svc.name)}</div>
              <div class="card-host">${escapeHtml(it.svc.host)}</div>
            </div>
            <div class="card-foot">
              <span class="pill"><span class="pdot"></span>${statusText(it.st)}</span>
              <span class="lat">${it.lat != null ? it.lat + " ms" : it.st === "down" ? "—" : ""}</span>
            </div>
          </div>`,
                    )
                    .join("")}</div>`;
            }

            function renderRows(items) {
                return `<div class="rows">${items
                    .map(
                        (it) => `
          <div class="row st-${it.st}" data-host="${it.svc.host}">
            <span class="r-num">${String(it.num).padStart(2, "0")}</span>
            <span class="r-ic">${iconHtml(it.svc)}</span>
            <span class="r-name">${escapeHtml(it.svc.name)}</span>
            <span class="r-host">${escapeHtml(it.svc.host)}</span>
            <span class="spark">${
                it.spark
                    ? `<svg width="62" height="18" viewBox="0 0 62 18"><polyline points="${it.spark}" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></polyline></svg>`
                    : ""
            }</span>
            <span class="r-lat">
              <span class="r-latbar"><i style="width:${it.latW}%"></i></span>
              <span class="r-ms">${it.lat != null ? it.lat + " ms" : ""}</span>
            </span>
            <button class="iconbtn" data-copy="${it.svc.host}" title="Copy URL">⧉</button>
            <span class="pill"><span class="pdot"></span>${statusText(it.st)}</span>
          </div>`,
                    )
                    .join("")}</div>`;
            }

            function wireBoardEvents() {
                board.querySelectorAll(".ghead").forEach((el) => {
                    el.addEventListener("click", () => toggleGroup(el.dataset.group));
                });
                board.querySelectorAll(".card, .row").forEach((el) => {
                    el.addEventListener("click", () => {
                        window.open(`https://${el.dataset.host}`, "_blank");
                    });
                    el.addEventListener("mousemove", spot);
                });
                board.querySelectorAll("[data-copy]").forEach((el) => {
                    el.addEventListener("click", (e) => {
                        const svc = state.services.find((s) => s.host === el.dataset.copy);
                        if (svc) copyUrl(svc, e);
                    });
                });
            }

            function renderSummary() {
                let up = 0,
                    down = 0,
                    checking = 0,
                    unknown = 0,
                    total = 0,
                    latSum = 0,
                    latN = 0;
                for (const s of state.services) {
                    total++;
                    const st = state.statuses[s.host];
                    if (st === "up") {
                        up++;
                        const l = state.latencies[s.host];
                        if (l != null) {
                            latSum += l;
                            latN++;
                        }
                    } else if (st === "down") down++;
                    else if (st === "unknown") unknown++;
                    else checking++;
                }
                const ringCls = down > 0 ? "bad" : checking > 0 || unknown > 0 ? "warn" : "ok";
                donutFg.className = "donut-fg " + ringCls;
                donutFg.setAttribute(
                    "stroke-dashoffset",
                    String(Math.round(100 * (1 - (total ? up / total : 0)) * 10) / 10),
                );
                donutText.textContent = up;

                const text = down > 0
                    ? down + " service" + (down > 1 ? "s" : "") + " down"
                    : checking > 0
                      ? "checking services…"
                      : unknown > 0
                        ? unknown + " unreachable"
                        : "all systems operational";
                sumText.textContent = text;
                const avgLat = latN ? Math.round(latSum / latN) + " ms avg latency" : "";
                sumSub.textContent =
                    up + " of " + total + " online" + (avgLat ? " · " + avgLat : "");
                sumLine.className =
                    "sum-line " +
                    ringCls +
                    (down > 0 || state.onlyDown ? " clickable" : "") +
                    (state.onlyDown ? " filtering" : "");
                sumLine.title = state.onlyDown
                    ? "Show all services (d)"
                    : down > 0
                      ? "Show only down services (d)"
                      : "";
                serviceCountFoot.textContent = `${state.services.length} services · config.json`;
            }

            sumLine.addEventListener("click", toggleDown);
            btnView.addEventListener("click", () =>
                setView(state.view === "cards" ? "rows" : "cards"),
            );
            btnGroups.addEventListener("click", toggleGrouped);
            btnRecheck.addEventListener("click", () => checkAll());
            btnTheme.addEventListener("click", () =>
                setTheme(state.theme === "dark" ? "light" : "dark"),
            );
            searchInput.addEventListener("input", (e) => {
                state.q = e.target.value;
                renderBoard();
            });

            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") {
                    state.q = "";
                    searchInput.value = "";
                    state.onlyDown = false;
                    renderBoard();
                    document.activeElement?.blur();
                    return;
                }
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k") {
                    e.preventDefault();
                    searchInput.focus();
                    return;
                }
                if (e.key === "Enter" && state.q.trim() && window.__hlFirstUrl) {
                    window.open(window.__hlFirstUrl, "_blank");
                    return;
                }
                const typing = /INPUT|TEXTAREA/.test(document.activeElement?.tagName || "");
                if (typing) return;
                const k = e.key.toLowerCase();
                if (k === "/") {
                    e.preventDefault();
                    searchInput.focus();
                } else if (k === "v") setView(state.view === "cards" ? "rows" : "cards");
                else if (k === "g") toggleGrouped();
                else if (k === "t") setTheme(state.theme === "dark" ? "light" : "dark");
                else if (k === "r") checkAll();
                else if (k === "d") toggleDown();
                else if (/^[1-9]$/.test(k) && state.grouped) {
                    const name = state.groupOrder[+k - 1];
                    if (name) toggleGroup(name);
                }
            });

            applyTheme();
            btnView.textContent = state.view === "cards" ? "▦" : "≡";
            btnGroups.textContent = state.grouped ? "#" : "=";

            fetch("./config.json")
                .then((r) => r.json())
                .then((data) => {
                    state.services = data.services || [];
                    const seen = new Set();
                    state.groupOrder = [];
                    for (const s of state.services) {
                        if (!seen.has(s.group)) {
                            seen.add(s.group);
                            state.groupOrder.push(s.group);
                        }
                    }
                    checkAll();
                    setInterval(() => checkAll(true), POLL_MS);
                })
                .catch(() => {
                    board.innerHTML = `<div class="empty"><span class="e-ic">⚠</span><div>failed to load config.json</div></div>`;
                });
        </script>
    </body>
</html>
